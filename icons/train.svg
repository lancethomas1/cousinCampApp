<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <clipPath id="boiler"><rect x="20" y="54" width="72" height="32" rx="16"/></clipPath>
    <clipPath id="cab"><rect x="86" y="45" width="31" height="41" rx="5"/></clipPath>
  </defs>

  <!-- Speed lines (graphic motion streaks trailing behind) -->
  <g stroke="#aee6ee" stroke-linecap="round" opacity=".5">
    <line x1="100" y1="50" x2="127" y2="50" stroke-width="3"/>
    <line x1="106" y1="63" x2="125" y2="63" stroke-width="2.4"/>
    <line x1="99" y1="77" x2="123" y2="77" stroke-width="2.4"/>
  </g>

  <!-- Headlamp beam -->
  <polygon points="22,60 0,67 4,90 25,73" fill="#fff0b8" opacity=".32"/>

  <!-- Angular cel-shaded smoke: flat billows + sharp wisps -->
  <g>
    <polygon fill="#26222b"
      points="33,40 27,28 38,30 41,18 51,24 53,11 65,16 70,6 80,14 92,11 99,20 95,29 84,28 88,38 70,36 64,42 49,40 43,44"/>
    <polygon fill="#4a4552"
      points="33,40 30,30 39,32 43,22 50,27 55,16 64,21 71,12 80,16 70,28 56,30 46,36"/>
    <polygon fill="#26222b" points="92,11 113,2 99,21"/>
    <polygon fill="#26222b" points="84,5 102,1 89,13" opacity=".85"/>
  </g>

  <!-- Whole engine leans into the motion -->
  <g transform="rotate(-3 64 70)">
    <!-- Driving gear -->
    <g stroke="#d4a52e" stroke-width="3">
      <circle cx="30" cy="97" r="8" fill="#16141a"/>
      <circle cx="55" cy="94" r="15" fill="#16141a"/>
      <circle cx="90" cy="94" r="15" fill="#16141a"/>
    </g>
    <g stroke="#5b5560" stroke-width="2" stroke-linecap="round">
      <line x1="55" y1="83" x2="55" y2="105"/><line x1="44" y1="94" x2="66" y2="94"/>
      <line x1="47" y1="86" x2="63" y2="102"/><line x1="47" y1="102" x2="63" y2="86"/>
      <line x1="90" y1="83" x2="90" y2="105"/><line x1="79" y1="94" x2="101" y2="94"/>
      <line x1="82" y1="86" x2="98" y2="102"/><line x1="82" y1="102" x2="98" y2="86"/>
    </g>
    <rect x="51" y="91.5" width="43" height="5" rx="2.5" fill="#d4a52e"/>
    <g fill="#d4a52e"><circle cx="55" cy="94" r="4"/><circle cx="90" cy="94" r="4"/><circle cx="30" cy="97" r="3"/></g>

    <!-- Footplate + aggressive cowcatcher -->
    <polygon points="20,85 4,100 23,100 25,85" fill="#1d1b20"/>
    <polygon points="14,84 116,84 116,92 14,92" fill="#332f34"/>
    <polygon points="14,88 116,88 116,92 14,92" fill="#1d1b20"/>
    <rect x="14" y="84" width="102" height="2.2" fill="#d4a52e"/>

    <!-- Cab (flat cel shading) -->
    <g clip-path="url(#cab)">
      <rect x="86" y="45" width="31" height="41" fill="#332f34"/>
      <polygon points="86,70 117,64 117,86 86,86" fill="#1d1b20"/>
      <rect x="86" y="45" width="31" height="4" fill="#585360"/>
    </g>
    <rect x="82" y="42" width="38" height="7" rx="3" fill="#16141a"/>
    <polygon points="92,54 110,54 110,70 92,70" fill="#5fd0e6"/>
    <polygon points="92,54 110,54 92,70" fill="#bff0fb" opacity=".7"/>
    <rect x="92" y="54" width="18" height="16" rx="2" fill="none" stroke="#d4a52e" stroke-width="1.5"/>

    <!-- Boiler (flat cel shading) -->
    <g clip-path="url(#boiler)">
      <rect x="20" y="54" width="72" height="32" fill="#332f34"/>
      <polygon points="20,66 92,74 92,86 20,86" fill="#1d1b20"/>
      <rect x="20" y="54" width="72" height="5" fill="#585360"/>
      <rect x="20" y="54" width="72" height="1.8" fill="#7fdbe8"/>
    </g>
    <g stroke="#1d1b20" stroke-width="2"><line x1="49" y1="55" x2="49" y2="85"/><line x1="71" y1="55" x2="71" y2="85"/></g>

    <!-- Funnel + dome -->
    <polygon points="29,54 46,54 49,40 26,40" fill="#2a262d"/>
    <polygon points="29,54 37,54 38,40 26,40" fill="#1d1b20"/>
    <rect x="25" y="37" width="25" height="4.5" rx="2.2" fill="#d4a52e"/>
    <path d="M55 54a9 9 0 0 1 18 0z" fill="#2a262d"/>
    <rect x="55" y="51.5" width="18" height="3" rx="1.5" fill="#d4a52e"/>

    <!-- Headlamp -->
    <circle cx="24" cy="65" r="5.5" fill="#ffce4d" stroke="#d4a52e" stroke-width="1.5"/>
    <circle cx="22.5" cy="63.5" r="1.8" fill="#fff6d8"/>
  </g>
</svg>
