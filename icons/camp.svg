<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- backdrop -->
    <linearGradient id="studio" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#211538"/><stop offset=".5" stop-color="#3a2767"/>
      <stop offset="1" stop-color="#5b3fa6"/>
    </linearGradient>
    <radialGradient id="spot" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#9d80e0" stop-opacity=".55"/>
      <stop offset="1" stop-color="#9d80e0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="floorglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#c9aeffff" stop-opacity=".5"/>
      <stop offset="1" stop-color="#c9aeff" stop-opacity="0"/>
    </radialGradient>

    <!-- metallic panels, light from upper-left -->
    <linearGradient id="bodyTop" x1="0.1" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#f3f7fc"/><stop offset=".45" stop-color="#dde3ec"/>
      <stop offset="1" stop-color="#b3bcca"/>
    </linearGradient>
    <linearGradient id="bodySide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e7ebf1"/><stop offset=".45" stop-color="#bcc4d0"/>
      <stop offset="1" stop-color="#828c9c"/>
    </linearGradient>
    <linearGradient id="fascia" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d7dde6"/><stop offset="1" stop-color="#9aa3b1"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1826"/><stop offset=".5" stop-color="#243650"/>
      <stop offset="1" stop-color="#56789a"/>
    </linearGradient>
    <radialGradient id="alloy" cx="0.42" cy="0.4" r="0.62">
      <stop offset="0" stop-color="#eef1f5"/><stop offset=".55" stop-color="#aab2c0"/>
      <stop offset="1" stop-color="#6c7484"/>
    </radialGradient>
    <radialGradient id="tire" cx="0.42" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#2a2730"/><stop offset="1" stop-color="#0d0b11"/>
    </radialGradient>

    <filter id="softshadow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.2"/>
    </filter>
    <filter id="reflblur"><feGaussianBlur stdDeviation="1.6"/></filter>

    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff" stop-opacity=".5"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <mask id="reflmask"><rect x="0" y="92" width="128" height="40" fill="url(#fade)"/></mask>
    <clipPath id="tile"><rect width="128" height="128" rx="28"/></clipPath>

    <!-- ===== the car ===== -->
    <g id="car">
      <!-- wheel-well ambient occlusion -->
      <ellipse cx="42" cy="84" rx="13" ry="11" fill="#14101f" opacity=".55"/>
      <ellipse cx="96" cy="79" rx="11" ry="9" fill="#14101f" opacity=".5"/>

      <!-- far rear wheel -->
      <circle cx="96" cy="80" r="9.4" fill="url(#tire)"/>
      <circle cx="96" cy="80" r="5.2" fill="url(#alloy)"/>
      <circle cx="96" cy="80" r="1.6" fill="#5b6470"/>

      <!-- side flank (rounded) -->
      <path d="M26 84 Q26 70 31 67.5 Q40 65 52 63.5 Q76 60 98 57.5 Q104 57 106 65
               L104.5 79 Q104 84 99 84 L31 88 Q26 88 26 84 Z"
            fill="url(#bodySide)"/>
      <!-- soft curvature highlight band along upper flank -->
      <path d="M32 70 Q42 66.5 52 65.5 Q76 62.5 99 60 Q101 61 100 62.5 Q76 65 52 68 Q42 69 33 72.5 Q31 71.5 32 70 Z"
            fill="#fbfdff" opacity=".5"/>
      <!-- lower body shade -->
      <path d="M28 80 Q66 76 104 73 L104.5 79 Q104 84 99 84 L31 88 Q26 88 26 84 L26.5 81 Z"
            fill="#5d6675" opacity=".4"/>

      <!-- greenhouse glass (rounded roof) -->
      <path d="M50.5 64 Q53 52 60 50 Q75 45.5 86 45.5 Q92 46.5 94 57 Z" fill="url(#glass)"/>
      <!-- glass reflections -->
      <path d="M56 54 Q63 51.5 70 51.5 L66 60 Q59 61 53.5 62 Z" fill="#cfe2f2" opacity=".2"/>
      <path d="M60 50.6 Q63.5 49.8 66 49.8 L62 61 L57.5 62 Z" fill="#eaf3fb" opacity=".16"/>
      <!-- B-pillar -->
      <line x1="68" y1="48" x2="62.5" y2="61" stroke="#111a28" stroke-width="1.5"/>
      <!-- chrome window surround -->
      <path d="M50.5 64 Q53 52 60 50 Q75 45.5 86 45.5 Q92 46.5 94 57"
            fill="none" stroke="#c2cad6" stroke-width="1.1" opacity=".85"/>

      <!-- roof top plane (curved) -->
      <path d="M59.5 50 Q74 45.5 86 45.5 Q90 45.7 93 50 Q78 52 62.5 55 Q60 52.5 59.5 50 Z" fill="url(#bodyTop)"/>
      <path d="M62 51.5 Q74 47.6 85 47.4 L87 48.6 Q74 50.5 63 53 Z" fill="#ffffff" opacity=".32"/>

      <!-- hood top plane (curved) -->
      <path d="M30.5 68 Q40 65 50 63.8 Q56 66 60 68.2 Q51 70.5 42 73 Q35 70 30.5 68 Z" fill="url(#bodyTop)"/>
      <path d="M33 68 Q41 65.8 49 65 Q44 68.5 40 71 Z" fill="#ffffff" opacity=".28"/>
      <path d="M36 68.6 Q44 66.6 52 65.4" stroke="#9aa3b1" stroke-width=".6" fill="none" opacity=".7"/>

      <!-- front fascia (rounded nose) -->
      <path d="M30.5 68 Q37 70.5 42 73 L41 84 L28.5 83 Q26 83 26 79 Q26.5 71 30.5 68 Z" fill="url(#fascia)"/>
      <!-- black urethane bumper -->
      <path d="M28 81.5 Q34 82 41 83 L40 86.5 Q34 86 28.5 86 Q26.5 86 26.5 83.5 Z" fill="#23202a"/>

      <!-- panel / door seam on flank -->
      <path d="M58 63.4 L60 84.6" stroke="#7c8595" stroke-width=".7" opacity=".75"/>
      <path d="M80 60.5 L82 83" stroke="#7c8595" stroke-width=".7" opacity=".6"/>
      <!-- character line -->
      <path d="M31 76 L103 70" stroke="#6e7686" stroke-width="1.1" opacity=".8"/>
      <path d="M31 75 L103 69" stroke="#fbfdff" stroke-width=".6" opacity=".5"/>

      <!-- rear side louvers -->
      <g stroke="#5b6371" stroke-width=".9">
        <line x1="89" y1="59" x2="99" y2="58"/><line x1="89" y1="61" x2="99" y2="60"/>
        <line x1="89" y1="63" x2="99" y2="62"/><line x1="89" y1="65" x2="99" y2="64"/>
      </g>

      <!-- side mirror -->
      <path d="M53 60 l-5 -2.6 q-2 -1 -1 1 l1 2.2 z" fill="#c2cad6"/>
      <path d="M48 57.4 l4 2.2" stroke="#7c8595" stroke-width="1" />

      <!-- headlights -->
      <rect x="27.5" y="71" width="9" height="4.3" rx="2" fill="#ffe48a" transform="rotate(8 32 73)"/>
      <ellipse cx="30.5" cy="72.6" rx="2.1" ry="1.5" fill="#fffdf0" transform="rotate(8 30 73)"/>
      <!-- grille slot -->
      <rect x="27.5" y="78" width="11" height="2.4" rx="1.1" fill="#15131a" transform="rotate(8 33 79)"/>
      <!-- OUTATIME plate -->
      <rect x="28.5" y="81.4" width="9.5" height="3.2" rx=".8" fill="#e9e2c0" stroke="#a8a37e" stroke-width=".5" transform="rotate(8 33 83)"/>

      <!-- near front wheel -->
      <circle cx="42" cy="85" r="11.2" fill="url(#tire)"/>
      <circle cx="42" cy="85" r="9.6" fill="none" stroke="#3a3640" stroke-width="1.4"/>
      <circle cx="42" cy="85" r="6.2" fill="url(#alloy)"/>
      <g stroke="#6c7484" stroke-width="1.4">
        <line x1="42" y1="85" x2="42" y2="79"/><line x1="42" y1="85" x2="47.7" y2="86.9"/>
        <line x1="42" y1="85" x2="44.5" y2="90.6"/><line x1="42" y1="85" x2="39.5" y2="90.6"/>
        <line x1="42" y1="85" x2="36.3" y2="86.9"/>
      </g>
      <circle cx="42" cy="85" r="1.9" fill="#cfd5de"/>
      <path d="M37 81 a6.2 6.2 0 0 1 6 -2.6" stroke="#fbfdff" stroke-width="1" fill="none" opacity=".6"/>

      <!-- ===== open gullwing door (near side) ===== -->
      <!-- interior revealed where the door lifted -->
      <path d="M51 63 Q55 52 59 50.5 L67.5 48.5 L62.5 61 Z" fill="#0b0e15"/>
      <path d="M53.5 60 Q56 53 59 51.5 L62 56 Q60 59 58 61 Z" fill="#2a2f3a"/>
      <path d="M55.5 57.5 q3 -1.5 5 -1 l0 4 q-3 .4 -5 1 z" fill="#41475440"/>
      <!-- shadow cast by the raised door onto the roof -->
      <path d="M60 50.5 L75 47.6 Q70 50.5 64 53 Z" fill="#0c0818" opacity=".3"/>

      <!-- raised door: stainless outer skin -->
      <path d="M58.5 50.5 L68 48 Q66.5 36 61 27 Q53.5 28.5 47 31.5 Q52 40.5 58.5 50.5 Z"
            fill="url(#bodyTop)" stroke="#9aa3b1" stroke-width=".5"/>
      <!-- leading-edge highlight -->
      <path d="M49 31.5 Q54.5 29.5 60 28.5 Q56 30.5 52.5 33 Q50.5 32 49 31.5 Z" fill="#ffffff" opacity=".4"/>
      <!-- door window -->
      <path d="M52.5 33.5 Q57 31.6 62.5 30.7 Q65 37 63.8 43 Q57.5 44 53 45.2 Q51.6 39.5 52.5 33.5 Z"
            fill="url(#glass)"/>
      <path d="M54 34.5 Q57.5 33.2 61 32.6 L58.5 42.5 Q55 43.2 53.6 44 Q53 39 54 34.5 Z"
            fill="#cfe2f2" opacity=".16"/>
      <!-- chrome window surround -->
      <path d="M52.5 33.5 Q57 31.6 62.5 30.7 Q65 37 63.8 43"
            fill="none" stroke="#c2cad6" stroke-width=".8" opacity=".8"/>
      <!-- door underside / thickness at hinge -->
      <path d="M58.5 50.5 L68 48 L67 49.6 L58 52 Z" fill="#5d6675"/>
    </g>
  </defs>

  <!-- ===== scene ===== -->
  <rect width="128" height="128" rx="28" fill="url(#studio)"/>
  <g clip-path="url(#tile)">
    <rect width="128" height="128" fill="url(#spot)"/>
    <!-- faint stars -->
    <g fill="#fff" opacity=".8">
      <circle cx="22" cy="20" r="1.1"/><circle cx="104" cy="18" r="1.3"/>
      <circle cx="64" cy="13" r=".9"/><circle cx="96" cy="34" r=".8"/>
      <circle cx="16" cy="40" r=".8"/><circle cx="114" cy="48" r="1"/>
    </g>
    <g fill="#fff" opacity=".4">
      <circle cx="44" cy="24" r=".7"/><circle cx="84" cy="26" r=".7"/>
      <circle cx="30" cy="30" r=".6"/><circle cx="116" cy="30" r=".6"/>
    </g>

    <!-- floor glow + reflection -->
    <ellipse cx="64" cy="100" rx="54" ry="15" fill="url(#floorglow)"/>
    <g mask="url(#reflmask)" filter="url(#reflblur)" opacity=".5"
       transform="matrix(1,0,0,-1,0,193)">
      <use href="#car"/>
    </g>

    <!-- contact shadow -->
    <ellipse cx="63" cy="93" rx="43" ry="6" fill="#0c0818" opacity=".55" filter="url(#softshadow)"/>

    <use href="#car"/>
  </g>
</svg>
