<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="night" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2475"/><stop offset=".55" stop-color="#5b3fa6"/>
      <stop offset="1" stop-color="#7a5fd0"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef1f5"/><stop offset=".5" stop-color="#c2c9d4"/>
      <stop offset="1" stop-color="#8d97a7"/>
    </linearGradient>
    <linearGradient id="wingL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9aa3b1"/><stop offset="1" stop-color="#e8ebf0"/>
    </linearGradient>
    <linearGradient id="wingR" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0" stop-color="#9aa3b1"/><stop offset="1" stop-color="#e8ebf0"/>
    </linearGradient>
    <radialGradient id="vortex" cx="0.5" cy="0.32" r="0.62">
      <stop offset="0" stop-color="#b89bff" stop-opacity=".55"/>
      <stop offset="1" stop-color="#b89bff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff6d8"/><stop offset=".4" stop-color="#ffce4d"/>
      <stop offset="1" stop-color="#ff6a2c" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="tile"><rect width="128" height="128" rx="28"/></clipPath>
  </defs>

  <rect width="128" height="128" rx="28" fill="url(#night)"/>
  <g clip-path="url(#tile)">
    <rect width="128" height="128" fill="url(#vortex)"/>
    <!-- stars -->
    <g fill="#fff">
      <circle cx="20" cy="20" r="1.6"/><circle cx="106" cy="17" r="1.9"/>
      <circle cx="62" cy="12" r="1.3"/><circle cx="92" cy="40" r="1.2"/>
      <circle cx="34" cy="42" r="1.1"/><circle cx="113" cy="54" r="1.4"/>
      <circle cx="15" cy="62" r="1.2"/><circle cx="76" cy="24" r="1"/>
    </g>
    <g fill="#fff" opacity=".55">
      <circle cx="46" cy="22" r=".8"/><circle cx="98" cy="64" r=".8"/>
      <circle cx="28" cy="30" r=".8"/><circle cx="118" cy="32" r=".8"/>
    </g>

    <!-- ground energy / headlight wash -->
    <ellipse cx="64" cy="100" rx="50" ry="14" fill="url(#glow)" opacity=".5"/>

    <!-- DeLorean, head-on, gullwing doors raised -->
    <g>
      <!-- raised gullwing doors (behind body) -->
      <path d="M61 47 L58 55 L22 34 Q19 32 21 29 L26 22 Q28 20 31 22 Z"
            fill="url(#wingL)" stroke="#6a7180" stroke-width="1.2" stroke-linejoin="round"/>
      <path d="M52 45 L50 51 L28 38 L31 31 Z" fill="#22304a"/>
      <path d="M67 47 L70 55 L106 34 Q109 32 107 29 L102 22 Q100 20 97 22 Z"
            fill="url(#wingR)" stroke="#6a7180" stroke-width="1.2" stroke-linejoin="round"/>
      <path d="M76 45 L78 51 L100 38 L97 31 Z" fill="#22304a"/>

      <!-- shadow -->
      <ellipse cx="64" cy="93" rx="38" ry="4" fill="#1c1233" opacity=".4"/>

      <!-- wheels peeking at the corners -->
      <circle cx="40" cy="88" r="9" fill="#16141a"/>
      <circle cx="88" cy="88" r="9" fill="#16141a"/>
      <circle cx="40" cy="88" r="3.4" fill="#cfd5de"/>
      <circle cx="88" cy="88" r="3.4" fill="#cfd5de"/>

      <!-- front fascia -->
      <path d="M43 66 L85 66 L95 86 Q95 90 91 90 L37 90 Q33 90 33 86 Z"
            fill="url(#steel)" stroke="#5b5560" stroke-width="1.2" stroke-linejoin="round"/>

      <!-- windshield -->
      <path d="M54 49 L74 49 L84 66 L44 66 Z" fill="#22304a"/>
      <path d="M54 49 L74 49 L79 57 L49 57 Z" fill="#3a5274" opacity=".85"/>
      <polygon points="44,66 54,49 58,49 50,66" fill="#5b7398" opacity=".5"/>
      <!-- roof -->
      <path d="M56 47 L72 47 L74 49 L54 49 Z" fill="#d6dbe3"/>

      <!-- body trim + grille -->
      <line x1="37" y1="79" x2="91" y2="79" stroke="#7c8593" stroke-width="1.3"/>
      <rect x="47" y="81" width="34" height="3.4" rx="1.5" fill="#16141a"/>
      <g stroke="#3a3640" stroke-width="1">
        <line x1="50" y1="82.7" x2="78" y2="82.7"/>
      </g>

      <!-- headlights -->
      <rect x="41" y="69" width="11" height="5" rx="2" fill="#ffce4d"/>
      <rect x="76" y="69" width="11" height="5" rx="2" fill="#ffce4d"/>
      <rect x="42.5" y="70" width="4" height="2" rx="1" fill="#fff6d8"/>
      <rect x="77.5" y="70" width="4" height="2" rx="1" fill="#fff6d8"/>

      <!-- OUTATIME plate -->
      <rect x="55" y="85.5" width="18" height="4.5" rx="1" fill="#e9e2c0" stroke="#b9b48f" stroke-width=".6"/>
    </g>
  </g>
</svg>
