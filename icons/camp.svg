<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="night" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2475"/><stop offset=".55" stop-color="#5b3fa6"/>
      <stop offset="1" stop-color="#7a5fd0"/>
    </linearGradient>
    <linearGradient id="side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e4e8ee"/><stop offset="1" stop-color="#9aa3b1"/>
    </linearGradient>
    <linearGradient id="topf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4f6f9"/><stop offset="1" stop-color="#c6cdd7"/>
    </linearGradient>
    <radialGradient id="vortex" cx="0.5" cy="0.32" r="0.62">
      <stop offset="0" stop-color="#b89bff" stop-opacity=".55"/>
      <stop offset="1" stop-color="#b89bff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff6d8"/><stop offset=".4" stop-color="#ffce4d"/>
      <stop offset="1" stop-color="#ff6a2c" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="tile"><rect width="128" height="128" rx="28"/></clipPath>
  </defs>

  <rect width="128" height="128" rx="28" fill="url(#night)"/>
  <g clip-path="url(#tile)">
    <rect width="128" height="128" fill="url(#vortex)"/>
    <!-- stars -->
    <g fill="#fff">
      <circle cx="20" cy="20" r="1.6"/><circle cx="106" cy="17" r="1.9"/>
      <circle cx="62" cy="12" r="1.3"/><circle cx="96" cy="34" r="1.2"/>
      <circle cx="30" cy="36" r="1.1"/><circle cx="115" cy="50" r="1.4"/>
      <circle cx="14" cy="54" r="1.2"/><circle cx="78" cy="20" r="1"/>
    </g>
    <g fill="#fff" opacity=".55">
      <circle cx="46" cy="20" r=".8"/><circle cx="102" cy="62" r=".8"/>
      <circle cx="26" cy="26" r=".8"/><circle cx="118" cy="28" r=".8"/>
    </g>

    <!-- ground energy -->
    <ellipse cx="64" cy="100" rx="52" ry="14" fill="url(#glow)" opacity=".5"/>

    <!-- DeLorean, front-left three-quarter -->
    <g stroke="#54505c" stroke-width="1.1" stroke-linejoin="round">
      <!-- shadow -->
      <ellipse cx="64" cy="94" rx="44" ry="5" fill="#1c1233" opacity=".4" stroke="none"/>

      <!-- far rear wheel -->
      <circle cx="96" cy="80" r="9.5" fill="#16141a" stroke="none"/>

      <!-- side flank -->
      <path d="M26 84 L30 68 L52 64 L98 58 L106 65 L104 80 Q104 84 99 84 L31 88 Q26 88 26 84 Z"
            fill="url(#side)"/>

      <!-- greenhouse glass -->
      <path d="M50 64 L57 50 L88 45 L94 57 Z" fill="#22304a" stroke="none"/>
      <path d="M50 64 L57 50 L66 49 L60 62 Z" fill="#3a5274" opacity=".8" stroke="none"/>
      <line x1="68" y1="48" x2="62" y2="61" stroke="#7c8593" stroke-width="1.2"/>

      <!-- roof top plane -->
      <path d="M57 50 L88 45 L93 50 L62 55 Z" fill="url(#topf)"/>

      <!-- hood top plane -->
      <path d="M30 68 L50 64 L60 68 L42 73 Z" fill="url(#topf)"/>

      <!-- front fascia -->
      <path d="M30 68 L42 73 L40 86 L28 84 Q26 84 26 80 Z" fill="#cbd2dc"/>

      <!-- near front wheel -->
      <circle cx="42" cy="86" r="11" fill="#16141a" stroke="none"/>
      <circle cx="42" cy="86" r="4.3" fill="#cfd5de" stroke="none"/>
      <circle cx="96" cy="80" r="3.6" fill="#cfd5de" stroke="none"/>

      <!-- detailing -->
      <g stroke="none">
        <!-- body character line -->
        <path d="M31 76 L102 70" stroke="#7c8593" stroke-width="1.3"/>
        <!-- dark lower cladding -->
        <path d="M31 84 L99 80 Q102 80 102 77 L103 79 L101 84 Q101 86 98 86 L33 89 Q29 89 29 85 Z"
              fill="#26232b" opacity=".9"/>
        <!-- rear louvers -->
        <g stroke="#6a7180" stroke-width="1">
          <line x1="90" y1="59" x2="98" y2="58.4"/><line x1="90" y1="61" x2="98" y2="60.4"/>
          <line x1="90" y1="63" x2="98" y2="62.4"/>
        </g>
        <!-- side mirror -->
        <path d="M52 58 l-4 -2 l0 3 l4 1 z" fill="#aeb6c2"/>
        <!-- headlights -->
        <rect x="28" y="71" width="8" height="4" rx="1.8" fill="#ffce4d" transform="rotate(7 32 73)"/>
        <rect x="29.5" y="72" width="3.5" height="2" rx="1" fill="#fff6d8" transform="rotate(7 31 73)"/>
        <!-- grille slot -->
        <rect x="28" y="77.5" width="11" height="2.4" rx="1.1" fill="#16141a" transform="rotate(7 33 78)"/>
        <!-- OUTATIME plate -->
        <rect x="29" y="81" width="9" height="3" rx="1" fill="#e9e2c0" stroke="#b9b48f" stroke-width=".5" transform="rotate(7 33 82)"/>
      </g>
    </g>
  </g>
</svg>
