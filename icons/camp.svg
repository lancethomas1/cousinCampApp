<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="night" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2475"/><stop offset=".55" stop-color="#5b3fa6"/>
      <stop offset="1" stop-color="#7a5fd0"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef1f5"/><stop offset=".5" stop-color="#c2c9d4"/>
      <stop offset="1" stop-color="#8d97a7"/>
    </linearGradient>
    <linearGradient id="trail" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0" stop-color="#ffe680" stop-opacity="0"/>
      <stop offset=".35" stop-color="#ffb43d"/><stop offset=".7" stop-color="#ff6a2c"/>
      <stop offset="1" stop-color="#ff3d2e"/>
    </linearGradient>
    <radialGradient id="vortex" cx="0.5" cy="0.34" r="0.62">
      <stop offset="0" stop-color="#b89bff" stop-opacity=".55"/>
      <stop offset="1" stop-color="#b89bff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="tile"><rect width="128" height="128" rx="28"/></clipPath>
  </defs>

  <rect width="128" height="128" rx="28" fill="url(#night)"/>
  <g clip-path="url(#tile)">
    <rect width="128" height="128" fill="url(#vortex)"/>
    <!-- stars -->
    <g fill="#fff">
      <circle cx="22" cy="22" r="1.6"/><circle cx="103" cy="18" r="1.9"/>
      <circle cx="60" cy="14" r="1.3"/><circle cx="88" cy="34" r="1.2"/>
      <circle cx="38" cy="40" r="1.1"/><circle cx="112" cy="48" r="1.4"/>
      <circle cx="16" cy="58" r="1.2"/><circle cx="74" cy="26" r="1"/>
    </g>
    <g fill="#fff" opacity=".55">
      <circle cx="48" cy="24" r=".8"/><circle cx="96" cy="58" r=".8"/>
      <circle cx="30" cy="32" r=".8"/><circle cx="118" cy="30" r=".8"/>
    </g>

    <!-- fire trails left behind at 88 mph -->
    <g>
      <rect x="36" y="92" width="92" height="6" rx="3" fill="url(#trail)"/>
      <rect x="84" y="100" width="44" height="5" rx="2.5" fill="url(#trail)" opacity=".85"/>
      <rect x="40" y="86" width="74" height="4" rx="2" fill="url(#trail)" opacity=".7"/>
    </g>

    <!-- DeLorean, side profile facing left -->
    <g>
      <!-- shadow -->
      <ellipse cx="64" cy="99" rx="44" ry="4.5" fill="#1c1233" opacity=".45"/>

      <!-- body -->
      <path d="M14 86
               L18 75 Q19 72 23 71
               L44 69 L56 58 Q58 56 62 56
               L84 56 L97 70 L111 72
               Q115 73 115 78 L115 86 Z"
            fill="url(#steel)" stroke="#5b5560" stroke-width="1.2"/>

      <!-- tinted greenhouse / windows -->
      <path d="M58 58 L82 58 L93 69 L48 69 L57 59 Z" fill="#22304a"/>
      <path d="M58 58 L82 58 L85 65 L60 65 Z" fill="#3a5274" opacity=".8"/>
      <line x1="70" y1="58" x2="70" y2="69" stroke="#5b5560" stroke-width="1.4"/>

      <!-- raised gullwing door -->
      <path d="M59 57 L81 57 L86 40 Q86 38 83 38 L65 38 Q62 38 62 41 Z"
            fill="url(#steel)" stroke="#5b5560" stroke-width="1.2"/>
      <path d="M65 41 L81 41 L84 53 L62 53 Z" fill="#22304a"/>
      <rect x="65" y="38" width="20" height="3" rx="1.5" fill="#aeb6c2"/>

      <!-- body trim lines + louvers -->
      <line x1="20" y1="80" x2="112" y2="80" stroke="#7c8593" stroke-width="1.4"/>
      <line x1="20" y1="82.5" x2="112" y2="82.5" stroke="#6a7180" stroke-width="1"/>
      <g stroke="#6a7180" stroke-width="1">
        <line x1="86" y1="70" x2="94" y2="70"/><line x1="86" y1="72.5" x2="94" y2="72.5"/>
        <line x1="86" y1="75" x2="94" y2="75"/>
      </g>
      <!-- headlight + vent -->
      <rect x="16" y="76" width="6" height="3.5" rx="1.5" fill="#ffce4d"/>
      <rect x="100" y="73" width="11" height="3" rx="1.5" fill="#ff5d4d"/>

      <!-- wheels -->
      <g>
        <circle cx="40" cy="89" r="11" fill="#16141a" stroke="#0f0d12" stroke-width="2"/>
        <circle cx="92" cy="89" r="11" fill="#16141a" stroke="#0f0d12" stroke-width="2"/>
        <circle cx="40" cy="89" r="4.5" fill="#cfd5de"/>
        <circle cx="92" cy="89" r="4.5" fill="#cfd5de"/>
        <circle cx="40" cy="89" r="1.6" fill="#7c8593"/>
        <circle cx="92" cy="89" r="1.6" fill="#7c8593"/>
      </g>
    </g>
  </g>
</svg>
