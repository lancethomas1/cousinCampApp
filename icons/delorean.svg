<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Standalone DeLorean glyph for in-app branding (header mark, hero
       watermark). Side profile drawn to real DMC-12 proportions — long low
       wedge, flat roof, louvered deck — with the near gullwing door up and
       fire trails burning on the road behind it. -->
  <defs>
    <linearGradient id="dl-steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f7fa"/>
      <stop offset=".38" stop-color="#d3dae2"/>
      <stop offset=".62" stop-color="#aab4c0"/>
      <stop offset=".82" stop-color="#929da9"/>
      <stop offset="1" stop-color="#79828f"/>
    </linearGradient>
    <linearGradient id="dl-door" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#b8c1cc"/>
      <stop offset=".5" stop-color="#dde3ea"/>
      <stop offset="1" stop-color="#f4f7fa"/>
    </linearGradient>
    <linearGradient id="dl-glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c121c"/>
      <stop offset=".55" stop-color="#1d2c40"/>
      <stop offset="1" stop-color="#3d556f"/>
    </linearGradient>
    <linearGradient id="dl-deck" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c4ccd5"/>
      <stop offset="1" stop-color="#9aa4b0"/>
    </linearGradient>
    <radialGradient id="dl-alloy" cx="0.4" cy="0.38" r="0.66">
      <stop offset="0" stop-color="#e8ecf1"/>
      <stop offset=".55" stop-color="#a8b1bc"/>
      <stop offset="1" stop-color="#636b77"/>
    </radialGradient>
    <radialGradient id="dl-tire" cx="0.42" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#23252b"/>
      <stop offset="1" stop-color="#0a0b0e"/>
    </radialGradient>
    <linearGradient id="dl-fire" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0" stop-color="#ff8c1a" stop-opacity="0"/>
      <stop offset=".45" stop-color="#ffa53d" stop-opacity=".85"/>
      <stop offset="1" stop-color="#ffd98a"/>
    </linearGradient>
    <filter id="dl-soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.6"/>
    </filter>

    <!-- turbine alloy wheel, centred at 0,0 (flat-faced, fine fins) -->
    <g id="dl-wheel">
      <circle r="9.4" fill="url(#dl-tire)"/>
      <circle r="7.9" fill="none" stroke="#2e3138" stroke-width="1"/>
      <circle r="7.2" fill="url(#dl-alloy)"/>
      <circle r="5.4" fill="none" stroke="#566070" stroke-width="2.6" stroke-dasharray="0.55 0.95"/>
      <circle r="3.4" fill="none" stroke="#7e8794" stroke-width="0.6"/>
      <circle r="1.6" fill="#c8ced6"/>
      <path d="M-4.6 -3.4 A5.8 5.8 0 0 1 3.4 -4.6" fill="none" stroke="#f8fbff" stroke-width="0.7" opacity=".5"/>
    </g>
  </defs>

  <!-- contact shadow -->
  <ellipse cx="64" cy="97" rx="55" ry="4.6" fill="#0c0818" opacity=".45" filter="url(#dl-soft)"/>

  <!-- fire trails on the road behind the car -->
  <g stroke="url(#dl-fire)" stroke-linecap="round" fill="none">
    <path d="M127 93.4 Q118 92.6 112 93.6 Q108 94.2 105.5 93.4" stroke-width="2.2" opacity=".95"/>
    <path d="M127 96.8 Q117 96 110 96.9 Q105 97.5 101 96.7" stroke-width="2.2" opacity=".8"/>
  </g>
  <!-- a few sparks licking up off the trails -->
  <g fill="#ffc25e">
    <path d="M112 91.8 q1 -2.6 2.2 -3.4 q-.2 2 .6 3.2 Z" opacity=".85"/>
    <path d="M119 94.9 q.8 -2 1.8 -2.6 q-.2 1.6 .5 2.5 Z" opacity=".6"/>
    <path d="M108 95.2 q.9 -2.2 2 -2.9 q-.2 1.8 .5 2.8 Z" opacity=".5"/>
  </g>

  <!-- ===== the car, facing left ===== -->
  <!-- open gullwing door (raised, leaning slightly forward like the photo) -->
  <g>
    <path d="M56 63.5 L50 31.5 Q49.7 29.5 51.7 29 L63.5 26.6 Q65.5 26.3 66.2 28.3 L80 63.5 Z"
          fill="url(#dl-door)" stroke="#8f99a6" stroke-width=".5"/>
    <!-- door glass (upper half of the raised door) -->
    <path d="M54.5 47 L52 34 Q51.7 32.5 53.3 32.1 L62.5 30.3 Q64 30.1 64.5 31.7 L69.5 44 Z"
          fill="url(#dl-glass)"/>
    <path d="M53.5 34 L62 32.2 L63.8 36.5 L55 38.3 Z" fill="#cfe2f2" opacity=".14"/>
    <!-- bright sill edge of the open door -->
    <path d="M56 63.5 L50 31.5 Q49.7 29.5 51.7 29" fill="none" stroke="#f8fbff" stroke-width=".9" opacity=".7"/>
    <!-- gas strut holding the door open -->
    <line x1="58.5" y1="66.5" x2="53.5" y2="44" stroke="#5d6675" stroke-width="1.1"/>
  </g>

  <!-- body silhouette: nose, hood, windshield, roof, deck, Kammback tail -->
  <path d="M8 77.5
           L46 72.6
           Q47.5 72.4 48.5 71.2
           L56.5 63.9
           Q57.2 63.3 58.2 63.3
           L79.5 63.3
           Q81 63.3 82.5 63.8
           L113.5 69.8
           Q117.5 70.6 117.8 73
           L118.3 84.5
           L118.3 87.5
           L107.5 87.5
           A 10.6 10.6 0 0 0 86.4 87.5
           L41.6 87.5
           A 10.6 10.6 0 0 0 20.4 87.5
           L9.5 87.5
           Q7.6 84 7.5 80.5
           Q7.5 78 8 77.5 Z"
        fill="url(#dl-steel)"/>

  <!-- windshield (raked) + A-pillar -->
  <path d="M49 71.5 L56.8 64.3 Q57.4 63.8 58.4 63.8 L64.5 63.8 Q61.5 68 60.3 72.4 Q54 72.2 49 71.5 Z"
        fill="url(#dl-glass)"/>
  <path d="M51 70.4 L57 64.9 L59.8 64.7 L54.6 71 Z" fill="#cfe2f2" opacity=".16"/>

  <!-- roof highlight -->
  <path d="M57.5 63.6 L80 63.6 L81.5 64.6 L57 64.8 Q57 64 57.5 63.6 Z" fill="#fbfdff" opacity=".55"/>

  <!-- hood: seam + soft top-light -->
  <path d="M10.5 77.1 L45.5 72.6 L46 73.4 L11 78 Z" fill="#fbfdff" opacity=".4"/>
  <path d="M14 77.3 Q30 75.2 45 73.3" stroke="#7b8493" stroke-width=".5" fill="none" opacity=".7"/>
  <path d="M16 78.6 Q30.5 76.6 44.5 74.8" stroke="#7b8493" stroke-width=".4" fill="none" opacity=".45"/>

  <!-- engine-deck louvers over the rear glass -->
  <path d="M84 64.6 L112.5 70.1 L114.5 71.2 L86.5 65.6 Z" fill="url(#dl-deck)"/>
  <g stroke="#525b68" stroke-width=".9" opacity=".85">
    <line x1="86.5" y1="66.2" x2="113.2" y2="71.5"/>
    <line x1="88.5" y1="67.6" x2="113.6" y2="72.6"/>
    <line x1="90.5" y1="69" x2="114" y2="73.7"/>
    <line x1="92.5" y1="70.4" x2="114.3" y2="74.8"/>
  </g>

  <!-- the character crease running nose to tail -->
  <path d="M8 80.2 Q60 78.4 117.6 76.4" stroke="#fbfdff" stroke-width=".7" opacity=".55" fill="none"/>
  <path d="M8 81 Q60 79.2 117.7 77.2" stroke="#67707e" stroke-width=".9" opacity=".8" fill="none"/>
  <!-- slightly darker flank below the crease -->
  <path d="M8 81 Q60 79.2 117.7 77.2 L118.3 84.5 L118.3 87.5 L107.5 87.5
           A 10.6 10.6 0 0 0 86.4 87.5 L41.6 87.5 A 10.6 10.6 0 0 0 20.4 87.5
           L9.5 87.5 Q7.6 84 7.5 80.5 Z" fill="#525a66" opacity=".22"/>

  <!-- open door bay: the whole side panel is gone down to the sill,
       revealing the cabin (roof rail stays intact above) -->
  <path d="M57.6 65 L78.7 65 L80.3 87.4 L48.8 87.4 L49.4 71.7 Q52.5 66.8 57.6 65 Z" fill="#0a0d13"/>
  <!-- rear bulkhead catching a little light -->
  <path d="M73 65.6 L78.7 65 L80.3 87.4 L74.5 87.4 Z" fill="#161a22"/>
  <!-- seat: back, headrest, cushion -->
  <path d="M58.5 84 Q58 70 62.5 67.5 L65.5 68 Q63.5 75 64 84 Z" fill="#262b34"/>
  <path d="M61.5 68.2 Q61.4 65.6 63.6 65.4 Q65.4 65.6 65 68 Z" fill="#343a46"/>
  <path d="M64 84 Q64 79 66 78 L73 78.5 Q71.5 81 71.5 84 Z" fill="#21262e"/>
  <!-- dark floor + bright sill lip at the bottom of the bay -->
  <rect x="48.8" y="84" width="31.5" height="3.4" fill="#05070a"/>
  <path d="M48.8 86.9 L80.3 86.9" stroke="#b9c2cc" stroke-width=".9" opacity=".75"/>

  <!-- black rocker panel + fascias (the DMC's grey-black lower trim) -->
  <path d="M9.5 87.5 L20.4 87.5 A 10.6 10.6 0 0 1 21.6 90.4 L11.5 90.4 Q10.2 89 9.5 87.5 Z" fill="#1a1d23"/>
  <path d="M41.6 87.5 L86.4 87.5 A 10.6 10.6 0 0 0 87.6 90.4 L40.4 90.4 A 10.6 10.6 0 0 0 41.6 87.5 Z" fill="#1a1d23"/>
  <path d="M107.5 87.5 L118.3 87.5 L118.3 90.4 L106.3 90.4 A 10.6 10.6 0 0 0 107.5 87.5 Z" fill="#1a1d23"/>
  <!-- front bumper cap + amber side marker -->
  <path d="M7.5 80.5 Q7.6 84 9.5 87.5 L11.5 90.4 Q9 90 8.2 87.5 Q7.2 84 7.5 80.5 Z" fill="#1a1d23"/>
  <rect x="8.6" y="78.4" width="3.4" height="1.5" rx=".6" fill="#ffb547"/>
  <!-- tail: black rear bumper edge + light sliver -->
  <path d="M116.4 84.8 L118.3 84.5 L118.3 90.4 L116.4 90.4 Z" fill="#1a1d23"/>
  <rect x="116.6" y="78.6" width="1.5" height="4.6" rx=".5" fill="#7c2730"/>

  <!-- wheels -->
  <use href="#dl-wheel" transform="translate(31 88)"/>
  <use href="#dl-wheel" transform="translate(97 88)"/>
  <!-- arch shadows over the tyres -->
  <path d="M20.4 87.5 A 10.6 10.6 0 0 1 41.6 87.5 L39.5 87.5 A 8.6 8.6 0 0 0 22.5 87.5 Z" fill="#101218" opacity=".8"/>
  <path d="M86.4 87.5 A 10.6 10.6 0 0 1 107.5 87.5 L105.4 87.5 A 8.6 8.6 0 0 0 88.5 87.5 Z" fill="#101218" opacity=".8"/>
</svg>
