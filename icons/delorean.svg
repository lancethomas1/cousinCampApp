<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Standalone DeLorean glyph for in-app branding (header mark, hero
       watermark). Same vector car as the pre-photo app icon, on a
       transparent background, trailing fire like it just hit 88 mph. -->
  <defs>
    <linearGradient id="bodyTop" x1="0.1" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#f3f7fc"/><stop offset=".45" stop-color="#dde3ec"/>
      <stop offset="1" stop-color="#b3bcca"/>
    </linearGradient>
    <linearGradient id="bodySide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e7ebf1"/><stop offset=".45" stop-color="#bcc4d0"/>
      <stop offset="1" stop-color="#828c9c"/>
    </linearGradient>
    <linearGradient id="doorSkin" x1="0" y1="1" x2="0.3" y2="0">
      <stop offset="0" stop-color="#aab2c0"/><stop offset=".6" stop-color="#dde3ec"/>
      <stop offset="1" stop-color="#f3f7fc"/>
    </linearGradient>
    <linearGradient id="fascia" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d7dde6"/><stop offset="1" stop-color="#9aa3b1"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1826"/><stop offset=".5" stop-color="#243650"/>
      <stop offset="1" stop-color="#56789a"/>
    </linearGradient>
    <radialGradient id="alloy" cx="0.42" cy="0.4" r="0.62">
      <stop offset="0" stop-color="#eef1f5"/><stop offset=".55" stop-color="#aab2c0"/>
      <stop offset="1" stop-color="#6c7484"/>
    </radialGradient>
    <radialGradient id="tire" cx="0.42" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#2a2730"/><stop offset="1" stop-color="#0d0b11"/>
    </radialGradient>
    <filter id="softshadow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.2"/>
    </filter>
    <g id="wheel">
      <circle r="10" fill="url(#tire)"/>
      <circle r="8.4" fill="none" stroke="#332f39" stroke-width="1.6"/>
      <circle r="7.6" fill="url(#alloy)"/>
      <circle r="6" fill="none" stroke="#5b6470" stroke-width="3" stroke-dasharray="0.7 1.15"/>
      <circle r="4" fill="none" stroke="#8b94a3" stroke-width="0.7"/>
      <circle r="2" fill="#cfd5de"/>
      <path d="M-5 -4 A6.4 6.4 0 0 1 4 -5" fill="none" stroke="#fbfdff" stroke-width="0.8" opacity=".55"/>
    </g>
    <!-- ===== the car (front-left 3/4, both gullwing doors up) ===== -->
    <g id="car">
      <!-- wheel-well ambient occlusion -->
      <ellipse cx="42" cy="84" rx="13" ry="11" fill="#14101f" opacity=".55"/>
      <ellipse cx="96" cy="79" rx="11" ry="9" fill="#14101f" opacity=".5"/>

      <!-- far rear wheel -->
      <use href="#wheel" transform="translate(96 80) scale(0.92)"/>

      <!-- FAR gullwing door (behind roof, rising up-right) -->
      <path d="M70 48 L84 45.5 Q92 38 98 30 Q92 31 86 33 Q77 41 70 48 Z"
            fill="url(#doorSkin)" stroke="#9aa3b1" stroke-width=".5"/>
      <path d="M76 39.5 Q82 35.5 88 33.5 Q90 37.5 89 42 Q83.5 43.5 78 45 Q76 41.5 76 39.5 Z" fill="url(#glass)"/>
      <path d="M70 48 L84 45.5 L83 47 L70.5 49.5 Z" fill="#5d6675"/>

      <!-- side flank -->
      <path d="M26 84 Q26 70 31 67.5 Q40 65 52 63.5 Q76 60 98 57.5 Q104 57 106 65
               L104.5 79 Q104 84 99 84 L31 88 Q26 88 26 84 Z" fill="url(#bodySide)"/>
      <path d="M32 70 Q42 66.5 52 65.5 Q76 62.5 99 60 Q101 61 100 62.5 Q76 65 52 68 Q42 69 33 72.5 Q31 71.5 32 70 Z"
            fill="#fbfdff" opacity=".5"/>
      <path d="M28 80 Q66 76 104 73 L104.5 79 Q104 84 99 84 L31 88 Q26 88 26 84 L26.5 81 Z"
            fill="#5d6675" opacity=".4"/>

      <!-- greenhouse glass (rear quarter) -->
      <path d="M50.5 64 Q53 52 60 50 Q75 45.5 86 45.5 Q92 46.5 94 57 Z" fill="url(#glass)"/>
      <!-- revealed interior under the open near door -->
      <path d="M50.5 64 Q53 52 60 50 L70 48.5 L66 55 Q60 58 56 62 Z" fill="#0b0e15"/>
      <!-- seat + headrest -->
      <path d="M55 62 Q55 54 60 52.5 L64.5 53.5 Q63 57 63 62 Z" fill="#2c313c"/>
      <path d="M58.5 54 Q58.5 51 61 50.6 Q63 51 62.7 53.6 Q60.5 53.8 58.5 54 Z" fill="#3a404c"/>
      <!-- rear glass reflection + B-pillar -->
      <path d="M74 50 Q80 48.5 86 48 L88 55 Q81 56 75 57.5 Z" fill="#cfe2f2" opacity=".16"/>
      <line x1="71" y1="47.5" x2="68" y2="55" stroke="#111a28" stroke-width="1.4"/>

      <!-- roof top plane (overlaps door hinges) -->
      <path d="M59.5 50 Q74 45.5 86 45.5 Q90 45.7 93 50 Q78 52 62.5 55 Q60 52.5 59.5 50 Z" fill="url(#bodyTop)"/>
      <path d="M62 51.5 Q74 47.6 85 47.4 L87 48.6 Q74 50.5 63 53 Z" fill="#ffffff" opacity=".32"/>

      <!-- hood top plane -->
      <path d="M30.5 68 Q40 65 50 63.8 Q56 66 60 68.2 Q51 70.5 42 73 Q35 70 30.5 68 Z" fill="url(#bodyTop)"/>
      <path d="M33 68 Q41 65.8 49 65 Q44 68.5 40 71 Z" fill="#ffffff" opacity=".28"/>
      <path d="M36 68.6 Q44 66.6 52 65.4" stroke="#9aa3b1" stroke-width=".6" fill="none" opacity=".7"/>

      <!-- front fascia -->
      <path d="M30.5 68 Q37 70.5 42 73 L41 80 L28.5 79.5 Q26 79 26 75 Q26.5 71 30.5 68 Z" fill="url(#fascia)"/>
      <!-- twin headlights -->
      <g transform="rotate(8 33 73)">
        <rect x="27.5" y="70.4" width="4.6" height="3.4" rx="1" fill="#ffe48a"/>
        <rect x="32.6" y="70.8" width="4.6" height="3.4" rx="1" fill="#ffe48a"/>
        <ellipse cx="29.8" cy="71.6" rx="1.4" ry="1" fill="#fffdf0"/>
      </g>
      <!-- DMC grille -->
      <rect x="27.5" y="75" width="11.5" height="2.3" rx="1" fill="#15131a" transform="rotate(8 33 76)"/>
      <rect x="31.6" y="75.3" width="3.4" height="1.6" rx=".4" fill="#aeb6c2" transform="rotate(8 33 76)"/>
      <!-- black slatted bumper -->
      <path d="M27.5 79 Q34 79.6 41 80.5 L40 86.5 Q34 86 28.5 86 Q26 86 26 83.5 Z" fill="#1f1c25"/>
      <g stroke="#3c3947" stroke-width=".7">
        <path d="M28 81.6 Q34 82.1 40.2 83" fill="none"/>
        <path d="M28 83.6 Q34 84.1 39.6 85" fill="none"/>
      </g>

      <!-- character line + door seams -->
      <path d="M31 76 L103 70" stroke="#6e7686" stroke-width="1.1" opacity=".8"/>
      <path d="M31 75 L103 69" stroke="#fbfdff" stroke-width=".6" opacity=".5"/>
      <path d="M80 60.5 L82 83" stroke="#7c8595" stroke-width=".7" opacity=".6"/>

      <!-- rear side louvers -->
      <g stroke="#5b6371" stroke-width=".9">
        <line x1="89" y1="59" x2="99" y2="58"/><line x1="89" y1="61" x2="99" y2="60"/>
        <line x1="89" y1="63" x2="99" y2="62"/><line x1="89" y1="65" x2="99" y2="64"/>
      </g>

      <!-- near front wheel (turbine) -->
      <use href="#wheel" transform="translate(42 85) scale(1.12)"/>

      <!-- NEAR gullwing door (on top, rising up-left) -->
      <path d="M60 50.5 L72 48 Q68 36 64 26 Q56 27.5 48 30 Q53 40 60 50.5 Z"
            fill="url(#doorSkin)" stroke="#9aa3b1" stroke-width=".5"/>
      <path d="M50 30 Q56 28 61 27.2 Q57 29 53.5 31.5 Q51.5 30.5 50 30 Z" fill="#ffffff" opacity=".4"/>
      <path d="M52 32 Q58 30 64 28.5 Q66.5 35 65 41 Q58 42.5 53 44 Q51.5 38 52 32 Z" fill="url(#glass)"/>
      <path d="M54 33.5 Q58 32.2 62 31.4 L59 41.5 Q55.5 42.2 54 43 Q53.4 38 54 33.5 Z" fill="#cfe2f2" opacity=".16"/>
      <path d="M52 32 Q58 30 64 28.5 Q66.5 35 65 41" fill="none" stroke="#c2cad6" stroke-width=".8" opacity=".8"/>
      <path d="M60 50.5 L72 48 L71 49.6 L60 52 Z" fill="#5d6675"/>
    </g>
  </defs>

  <!-- fire trails streaking out behind the car -->
  <g stroke-linecap="round" fill="none">
    <path d="M104 56 Q116 55 127 56"  stroke="#ffb340" stroke-width="3"   opacity=".75"/>
    <path d="M108 66 Q118 65.5 126 66" stroke="#ffd27a" stroke-width="2.4" opacity=".6"/>
    <path d="M103 78 Q114 77.5 124 78" stroke="#ff9d2e" stroke-width="2.4" opacity=".55"/>
  </g>

  <!-- contact shadow + the car, scaled up to fill the glyph box -->
  <g transform="translate(64 64) scale(1.22) translate(-66 -58)">
    <ellipse cx="63" cy="93" rx="44" ry="6" fill="#0c0818" opacity=".45" filter="url(#softshadow)"/>
    <use href="#car"/>
  </g>
</svg>
