<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Standalone DeLorean glyph for in-app branding (header mark, hero
       watermark). Front three-quarter view matching the photo icon — long,
       LOW and wide: thin nose band, big flat hood, low raked cabin, wide
       shallow gullwing doors, fire trails burning on the road behind. -->
  <defs>
    <linearGradient id="dl-hood" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#f4f7fa"/>
      <stop offset=".55" stop-color="#d8dee6"/>
      <stop offset="1" stop-color="#b9c2cc"/>
    </linearGradient>
    <linearGradient id="dl-fascia" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d3d9e1"/>
      <stop offset=".6" stop-color="#aab3be"/>
      <stop offset="1" stop-color="#8a93a0"/>
    </linearGradient>
    <linearGradient id="dl-flank" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dde3ea"/>
      <stop offset=".45" stop-color="#b4bdc8"/>
      <stop offset="1" stop-color="#7f8995"/>
    </linearGradient>
    <linearGradient id="dl-door" x1="0" y1="1" x2="0.3" y2="0">
      <stop offset="0" stop-color="#b0b9c4"/>
      <stop offset=".55" stop-color="#dde3ea"/>
      <stop offset="1" stop-color="#f4f7fa"/>
    </linearGradient>
    <linearGradient id="dl-glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c121c"/>
      <stop offset=".55" stop-color="#1d2c40"/>
      <stop offset="1" stop-color="#3d556f"/>
    </linearGradient>
    <radialGradient id="dl-alloy" cx="0.4" cy="0.38" r="0.66">
      <stop offset="0" stop-color="#e8ecf1"/>
      <stop offset=".55" stop-color="#a8b1bc"/>
      <stop offset="1" stop-color="#636b77"/>
    </radialGradient>
    <radialGradient id="dl-tire" cx="0.42" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#23252b"/>
      <stop offset="1" stop-color="#0a0b0e"/>
    </radialGradient>
    <linearGradient id="dl-fire" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0" stop-color="#ff8c1a" stop-opacity="0"/>
      <stop offset=".45" stop-color="#ffa53d" stop-opacity=".85"/>
      <stop offset="1" stop-color="#ffd98a"/>
    </linearGradient>
    <filter id="dl-soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.6"/>
    </filter>

    <!-- turbine alloy wheel, centred at 0,0 -->
    <g id="dl-wheel">
      <circle r="9.4" fill="url(#dl-tire)"/>
      <circle r="7.9" fill="none" stroke="#2e3138" stroke-width="1"/>
      <circle r="7.2" fill="url(#dl-alloy)"/>
      <circle r="5.4" fill="none" stroke="#566070" stroke-width="2.6" stroke-dasharray="0.55 0.95"/>
      <circle r="3.4" fill="none" stroke="#7e8794" stroke-width="0.6"/>
      <circle r="1.6" fill="#c8ced6"/>
      <path d="M-4.6 -3.4 A5.8 5.8 0 0 1 3.4 -4.6" fill="none" stroke="#f8fbff" stroke-width="0.7" opacity=".5"/>
    </g>
  </defs>

  <!-- contact shadow -->
  <ellipse cx="62" cy="98" rx="55" ry="4.8" fill="#0c0818" opacity=".45" filter="url(#dl-soft)"/>

  <!-- fire trails on the road, streaking out behind the car -->
  <g stroke="url(#dl-fire)" stroke-linecap="round" fill="none">
    <path d="M127 89.5 Q118 89 111 90 Q106.5 90.6 103 89.8" stroke-width="2.2" opacity=".95"/>
    <path d="M127 94.5 Q117 93.8 109 94.8 Q104 95.4 100 94.6" stroke-width="2.2" opacity=".8"/>
  </g>
  <g fill="#ffc25e">
    <path d="M111 87.8 q1 -2.6 2.2 -3.4 q-.2 2 .6 3.2 Z" opacity=".85"/>
    <path d="M118 91.5 q.8 -2 1.8 -2.6 q-.2 1.6 .5 2.5 Z" opacity=".6"/>
  </g>

  <!-- ===== far gullwing door: hinged at the roof spine, winging up-right ===== -->
  <g>
    <path d="M52 61.8 L73 32.5 Q74.1 31 75.9 32 L89.5 40.5 Q91.2 41.6 90 43.3 L68 60.8 Z"
          fill="url(#dl-door)" stroke="#8f99a6" stroke-width=".5"/>
    <path d="M61.5 51 L74.5 35.8 Q75.5 34.7 76.9 35.5 L84.8 40.4 Q86.2 41.3 85.1 42.7 L70.5 55 Z"
          fill="url(#dl-glass)"/>
    <path d="M52 61.8 L73 32.5 Q74.1 31 75.9 32" fill="none" stroke="#f8fbff" stroke-width=".8" opacity=".6"/>
  </g>

  <!-- ===== body ===== -->
  <!-- near flank, long and low, receding to the tail -->
  <path d="M45 83.2
           L60 73.6
           L102 66.6
           L112.5 68
           Q114.3 68.4 114.4 70.2
           L115 79.5
           L114.8 86.2
           L106.2 87.2
           A 8.6 8.6 0 0 0 89.4 89.2
           L57.2 93.2
           A 10.9 10.9 0 0 0 35.6 95.8
           L45.6 95.4
           Z"
        fill="url(#dl-flank)"/>
  <!-- rebuild bottom edge cleanly: rocker runs front arch → rear arch → tail -->
  <path d="M45 83.2 L35.2 92.9 L35.6 95.8 Z" fill="url(#dl-flank)" opacity="0"/>

  <!-- louvered engine deck: narrow plane sloping off the roof to the tail -->
  <path d="M78.5 63.2 L110.5 67.6 Q113.6 68.1 114.4 70.2 L114.6 72 L102 66.6 L79 64.6 Z" fill="#9aa4b0"/>
  <g stroke="#525b68" stroke-width=".85" opacity=".85">
    <line x1="82" y1="64.8" x2="113.4" y2="69.6"/>
    <line x1="86" y1="65.6" x2="114.2" y2="71.1"/>
  </g>

  <!-- fascia: thin wide nose band facing the viewer -->
  <path d="M5.5 79.5 L45 83.2 L45.4 91.2 L5.2 87.4 Q5.1 83.4 5.5 79.5 Z" fill="url(#dl-fascia)"/>
  <!-- hood: big, nearly flat plane -->
  <path d="M5.5 79.5 L45 83.2 L60 73.6 L29 69.8 Z" fill="url(#dl-hood)"/>
  <!-- hood seams running back toward the windshield -->
  <g stroke="#8b94a2" stroke-width=".55" fill="none" opacity=".8">
    <path d="M15.5 80.6 L36 71"/>
    <path d="M28 81.8 L47.5 72.3"/>
  </g>
  <path d="M6.2 79.6 L44.4 83.2 L44 84.2 L6 80.6 Z" fill="#fbfdff" opacity=".5"/>

  <!-- windshield, low and fast-raked, with thin pillars -->
  <path d="M29 69.8 L60 73.6 L64 64.2 L42 60.7 Z" fill="url(#dl-glass)"/>
  <path d="M32.5 69.2 L44 62.2 L47.5 62.8 L36.5 70 Z" fill="#cfe2f2" opacity=".15"/>
  <path d="M60 73.6 L64 64.2 L65.3 64.4 L61.6 73.9 Z" fill="#c3ccd6"/>
  <path d="M29 69.8 L42 60.7 L43.3 60.9 L30.6 70.1 Z" fill="#aeb7c2"/>

  <!-- roof: small low plane -->
  <path d="M42 60.7 L64 64.2 L78.5 63.2 L57.5 60 Z" fill="url(#dl-hood)"/>
  <path d="M42 60.7 L64 64.2 L78.5 63.2" fill="none" stroke="#fbfdff" stroke-width=".7" opacity=".6"/>

  <!-- open near-door bay: cabin revealed down to the sill -->
  <path d="M60 73.6 L81 70.4 L83 89.9 L62 92.6 L60.6 80 Z" fill="#0a0d13"/>
  <!-- seats inside -->
  <path d="M65.5 91.8 Q64.5 76.5 68.5 74.6 L71.5 75 Q70 81.5 70.6 91.2 Z" fill="#262b34"/>
  <path d="M67.6 75.3 Q67.5 72.8 69.6 72.6 Q71.3 72.8 71 75.2 Z" fill="#343a46"/>
  <path d="M70.6 91.2 Q70.4 85 72.6 84.2 L78.5 83.6 Q77.6 86.6 77.9 90.3 Z" fill="#21262e"/>
  <!-- bright sill lip -->
  <path d="M62 91.9 L82.9 89.3" stroke="#b9c2cc" stroke-width=".9" opacity=".75"/>

  <!-- beltline highlight -->
  <path d="M60 73.6 L102 66.6" stroke="#f8fbff" stroke-width=".6" opacity=".5"/>

  <!-- character crease: wraps the nose band, runs along the flank to the tail -->
  <path d="M5.4 83.4 L45.2 87.1" stroke="#67707e" stroke-width=".85" opacity=".75" fill="none"/>
  <path d="M57.5 84.6 L114.7 75" stroke="#67707e" stroke-width=".9" opacity=".8" fill="none"/>
  <path d="M57.5 83.8 L114.6 74.2" stroke="#fbfdff" stroke-width=".6" opacity=".5" fill="none"/>
  <!-- darker flank below the crease -->
  <path d="M57.5 84.6 L114.7 75 L115 79.5 L114.8 86.2 L106.2 87.2
           A 8.6 8.6 0 0 0 89.4 89.2 L57.2 93.2 Z" fill="#525a66" opacity=".22"/>

  <!-- ===== near gullwing door: hinged at the roof spine, winging up-left
       toward the viewer (the pair reads as a wide V, like the photo) ===== -->
  <g>
    <path d="M53.5 62.6 L31.5 42.5 Q30.1 41.2 31.4 39.6 L38.6 31.6 Q40 30.2 41.6 31.6 L69.5 61.4 Q61 60.5 53.5 62.6 Z"
          fill="url(#dl-door)" stroke="#8f99a6" stroke-width=".5"/>
    <path d="M48 56.5 L35.5 45 Q34.2 43.9 35.4 42.5 L40.2 37.2 Q41.4 35.9 42.7 37.2 L55.5 50.6 Q51 52.5 48 56.5 Z"
          fill="url(#dl-glass)"/>
    <path d="M37.5 40.5 L43 34.5 L46.5 38 L40.5 43.5 Z" fill="#cfe2f2" opacity=".14"/>
    <path d="M53.5 62.6 L31.5 42.5 Q30.1 41.2 31.4 39.6" fill="none" stroke="#f8fbff" stroke-width=".9" opacity=".7"/>
  </g>

  <!-- quad headlights, lit — shallow strip along the nose -->
  <g>
    <rect x="8" y="80.6" width="5" height="3" rx=".7" fill="#ffe48a" transform="rotate(5 10.5 82.1)"/>
    <rect x="14" y="81.2" width="5" height="3" rx=".7" fill="#ffe48a" transform="rotate(5 16.5 82.7)"/>
    <rect x="27.5" y="82.4" width="5.4" height="3.2" rx=".7" fill="#ffe48a" transform="rotate(5 30.2 84)"/>
    <rect x="33.8" y="83" width="5.4" height="3.2" rx=".7" fill="#ffe48a" transform="rotate(5 36.5 84.6)"/>
    <ellipse cx="10.6" cy="81.7" rx="1.3" ry=".9" fill="#fffdf0"/>
    <ellipse cx="30.3" cy="83.6" rx="1.3" ry=".9" fill="#fffdf0"/>
  </g>
  <!-- slim black grille between the light pairs + badge -->
  <path d="M20.2 81.8 L26.6 82.4 L26.4 85.4 L20 84.8 Z" fill="#15171c"/>
  <rect x="21.6" y="83" width="3.2" height="1.4" rx=".3" fill="#aeb6c2"/>
  <!-- black front bumper with rub strip -->
  <path d="M5.2 87.4 L45.4 91.2 L45.6 95.4 L7 91.8 Q5.6 89.8 5.2 87.4 Z" fill="#1a1d23"/>
  <path d="M6.4 89.3 L44.8 93" stroke="#3c3947" stroke-width=".8" fill="none"/>
  <!-- amber corner indicators -->
  <rect x="6" y="80.3" width="2.4" height="1.5" rx=".5" fill="#ffb547"/>
  <rect x="40.6" y="83.6" width="2.6" height="1.6" rx=".5" fill="#ffb547"/>

  <!-- black rocker under the flank + tail trim -->
  <path d="M57.2 93.2 L89.4 89.2 A 8.6 8.6 0 0 0 90.3 92 L58 96 A 10.9 10.9 0 0 0 57.2 93.2 Z" fill="#1a1d23"/>
  <path d="M106.2 87.2 L114.8 86.2 L114.7 89 L107 89.9 A 8.6 8.6 0 0 0 106.2 87.2 Z" fill="#1a1d23"/>
  <path d="M113.2 79.7 L115 79.5 L114.8 89 L113.2 89.2 Z" fill="#1a1d23"/>
  <rect x="113.3" y="73.9" width="1.4" height="4" rx=".5" fill="#7c2730"/>

  <!-- wheels: near front biggest, rear smaller and farther -->
  <use href="#dl-wheel" transform="translate(46.5 92.5) scale(1.12)"/>
  <use href="#dl-wheel" transform="translate(97.5 89.5) scale(.9 .93)"/>
  <!-- arch shadows over the tyres -->
  <path d="M35.6 95.8 A 10.9 10.9 0 0 1 57.2 93.2 L55.1 93.5 A 8.9 8.9 0 0 0 37.7 95.6 Z" fill="#101218" opacity=".8"/>
  <path d="M89.4 89.2 A 8.6 8.6 0 0 1 106.2 87.2 L104.2 87.4 A 6.9 6.9 0 0 0 91.2 89 Z" fill="#101218" opacity=".8"/>
</svg>
