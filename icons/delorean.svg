<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Standalone DeLorean glyph for in-app branding (header mark, hero
       watermark). Front three-quarter view matching the photo icon — nose
       toward the viewer, both gullwing doors up, drawn to real DMC-12
       proportions with fire trails burning on the road behind it. -->
  <defs>
    <linearGradient id="dl-hood" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#f4f7fa"/>
      <stop offset=".55" stop-color="#d8dee6"/>
      <stop offset="1" stop-color="#b9c2cc"/>
    </linearGradient>
    <linearGradient id="dl-fascia" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cdd4dc"/>
      <stop offset=".6" stop-color="#a7b0bb"/>
      <stop offset="1" stop-color="#8a93a0"/>
    </linearGradient>
    <linearGradient id="dl-flank" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dde3ea"/>
      <stop offset=".45" stop-color="#b4bdc8"/>
      <stop offset="1" stop-color="#7f8995"/>
    </linearGradient>
    <linearGradient id="dl-door" x1="0" y1="1" x2="0.3" y2="0">
      <stop offset="0" stop-color="#b0b9c4"/>
      <stop offset=".55" stop-color="#dde3ea"/>
      <stop offset="1" stop-color="#f4f7fa"/>
    </linearGradient>
    <linearGradient id="dl-glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c121c"/>
      <stop offset=".55" stop-color="#1d2c40"/>
      <stop offset="1" stop-color="#3d556f"/>
    </linearGradient>
    <radialGradient id="dl-alloy" cx="0.4" cy="0.38" r="0.66">
      <stop offset="0" stop-color="#e8ecf1"/>
      <stop offset=".55" stop-color="#a8b1bc"/>
      <stop offset="1" stop-color="#636b77"/>
    </radialGradient>
    <radialGradient id="dl-tire" cx="0.42" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#23252b"/>
      <stop offset="1" stop-color="#0a0b0e"/>
    </radialGradient>
    <linearGradient id="dl-fire" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0" stop-color="#ff8c1a" stop-opacity="0"/>
      <stop offset=".45" stop-color="#ffa53d" stop-opacity=".85"/>
      <stop offset="1" stop-color="#ffd98a"/>
    </linearGradient>
    <filter id="dl-soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.6"/>
    </filter>

    <!-- turbine alloy wheel, centred at 0,0 -->
    <g id="dl-wheel">
      <circle r="9.4" fill="url(#dl-tire)"/>
      <circle r="7.9" fill="none" stroke="#2e3138" stroke-width="1"/>
      <circle r="7.2" fill="url(#dl-alloy)"/>
      <circle r="5.4" fill="none" stroke="#566070" stroke-width="2.6" stroke-dasharray="0.55 0.95"/>
      <circle r="3.4" fill="none" stroke="#7e8794" stroke-width="0.6"/>
      <circle r="1.6" fill="#c8ced6"/>
      <path d="M-4.6 -3.4 A5.8 5.8 0 0 1 3.4 -4.6" fill="none" stroke="#f8fbff" stroke-width="0.7" opacity=".5"/>
    </g>
  </defs>

  <!-- contact shadow -->
  <ellipse cx="62" cy="99" rx="52" ry="5.2" fill="#0c0818" opacity=".45" filter="url(#dl-soft)"/>

  <!-- fire trails on the road, streaking out behind the car -->
  <g stroke="url(#dl-fire)" stroke-linecap="round" fill="none">
    <path d="M127 90.5 Q117 90 110 91 Q105.5 91.6 102 90.8" stroke-width="2.2" opacity=".95"/>
    <path d="M127 95.5 Q116 94.8 108 95.8 Q103 96.4 99 95.6" stroke-width="2.2" opacity=".8"/>
  </g>
  <g fill="#ffc25e">
    <path d="M110 88.8 q1 -2.6 2.2 -3.4 q-.2 2 .6 3.2 Z" opacity=".85"/>
    <path d="M117 92.5 q.8 -2 1.8 -2.6 q-.2 1.6 .5 2.5 Z" opacity=".6"/>
  </g>

  <!-- ===== far gullwing door, rising up-right above the roof ===== -->
  <g>
    <path d="M48.5 53.5 L67 17.5 Q68 15.7 70 16.3 L80.5 20 Q82.3 20.8 81.5 22.8 L60 53.5 Z"
          fill="url(#dl-door)" stroke="#8f99a6" stroke-width=".5"/>
    <path d="M58 39 L69.5 21.5 Q70.4 20.2 71.9 20.8 L78.3 23.2 Q79.8 23.9 79 25.5 L66.5 42 Z"
          fill="url(#dl-glass)"/>
    <path d="M48.5 53.5 L67 17.5 Q68 15.7 70 16.3" fill="none" stroke="#f8fbff" stroke-width=".8" opacity=".6"/>
  </g>

  <!-- ===== body ===== -->
  <!-- near flank, receding to the tail -->
  <path d="M38 77
           L56 66.5
           L100 60.8
           L111.5 62.8
           Q113.2 63.2 113.3 65
           L113.6 79.5
           L113.6 83.5
           L104 84.6
           A 8.8 8.8 0 0 0 87 82.6
           L58.5 86.2
           A 10.8 10.8 0 0 0 37.2 89.3
           L40 93 Z"
        fill="url(#dl-flank)"/>

  <!-- rear engine-deck louvers, sloping from the roof to the tail -->
  <path d="M76.5 56.5 L111.5 62.8 Q113.2 63.2 113.3 65 L113.5 67.5 L100 60.8 L77 57.8 Z" fill="#9aa4b0"/>
  <g stroke="#525b68" stroke-width=".9" opacity=".85">
    <line x1="80" y1="58.6" x2="112.6" y2="64.8"/>
    <line x1="84" y1="59.6" x2="113" y2="66.2"/>
    <line x1="88" y1="60.4" x2="113.3" y2="67.6"/>
  </g>

  <!-- fascia (front face, toward the viewer) -->
  <path d="M8 73.5 L38 77 L40 93 L10 88.5 Q8.6 81 8 73.5 Z" fill="url(#dl-fascia)"/>
  <!-- hood top plane -->
  <path d="M8 73.5 L38 77 L56 66.5 L30 62 Z" fill="url(#dl-hood)"/>
  <!-- hood seams converging toward the windshield -->
  <g stroke="#8b94a2" stroke-width=".55" fill="none" opacity=".8">
    <path d="M16 74.4 L36 64.7"/>
    <path d="M27 75.8 L46 66.2"/>
  </g>
  <path d="M8.6 73.7 L37.4 77.1 L38 78 L9 74.6 Z" fill="#fbfdff" opacity=".5"/>

  <!-- windshield + thin A-pillars -->
  <path d="M30 62 L56 66.5 L60 57.7 L40 53.6 Z" fill="url(#dl-glass)"/>
  <path d="M33 61.5 L42 55 L45 55.6 L36.5 62.2 Z" fill="#cfe2f2" opacity=".15"/>
  <path d="M56 66.5 L60 57.7 L61.3 58 L57.6 66.8 Z" fill="#c3ccd6"/>
  <path d="M30 62 L40 53.6 L41.3 53.8 L31.6 62.3 Z" fill="#aeb7c2"/>

  <!-- roof plane -->
  <path d="M40 53.6 L60 57.7 L76.5 56.5 L55.5 52.6 Z" fill="url(#dl-hood)"/>
  <path d="M40 53.6 L60 57.7 L76.5 56.5" fill="none" stroke="#fbfdff" stroke-width=".7" opacity=".6"/>

  <!-- open near-door bay: cabin revealed down to the sill -->
  <path d="M56 66.5 L78 63.7 L80.5 84.5 L58.4 87.3 L56.8 74 Z" fill="#0a0d13"/>
  <!-- seats + console inside -->
  <path d="M62 85.8 Q61 70.5 65.5 68.5 L68.5 69 Q66.8 76 67.5 85 Z" fill="#262b34"/>
  <path d="M64.6 69.2 Q64.5 66.6 66.7 66.4 Q68.5 66.6 68.1 69.1 Z" fill="#343a46"/>
  <path d="M67.5 85 Q67.3 79.5 69.5 78.6 L75.5 78 Q74.5 81 74.8 84.2 Z" fill="#21262e"/>
  <!-- bright sill lip -->
  <path d="M58.2 86.6 L80.3 83.9" stroke="#b9c2cc" stroke-width=".9" opacity=".75"/>

  <!-- beltline highlight along the flank -->
  <path d="M56 66.5 L100 60.8" stroke="#f8fbff" stroke-width=".6" opacity=".5"/>

  <!-- character crease wrapping nose and running to the tail -->
  <path d="M9.2 80.2 L38.8 84.3" stroke="#67707e" stroke-width=".9" opacity=".75" fill="none"/>
  <path d="M38.8 84.3 L113.4 72.5" stroke="#67707e" stroke-width=".9" opacity=".8" fill="none"/>
  <path d="M38.8 83.5 L113.3 71.7" stroke="#fbfdff" stroke-width=".6" opacity=".5" fill="none"/>
  <!-- darker flank below the crease -->
  <path d="M38.8 84.3 L113.4 72.5 L113.6 79.5 L113.6 83.5 L104 84.6
           A 8.8 8.8 0 0 0 87 82.6 L58.5 86.2 A 10.8 10.8 0 0 0 37.2 89.3
           L40 93 Z" fill="#525a66" opacity=".22"/>

  <!-- ===== near gullwing door, rising up-left toward the viewer ===== -->
  <g>
    <path d="M40 56 L29.5 21.5 Q28.9 19.5 30.9 18.9 L48.5 14.4 Q50.6 13.9 51.4 16 L62.5 54.5 Q52 50.5 40 56 Z"
          fill="url(#dl-door)" stroke="#8f99a6" stroke-width=".5"/>
    <path d="M37.5 44 L31.8 24.5 Q31.3 22.9 33 22.4 L46.5 19 Q48.2 18.6 48.8 20.3 L54.5 40 Q45.5 38.5 37.5 44 Z"
          fill="url(#dl-glass)"/>
    <path d="M33.5 25 L46 21.8 L47.6 26.2 L35 29.5 Z" fill="#cfe2f2" opacity=".14"/>
    <path d="M40 56 L29.5 21.5 Q28.9 19.5 30.9 18.9" fill="none" stroke="#f8fbff" stroke-width=".9" opacity=".7"/>
  </g>

  <!-- quad headlights, lit -->
  <g>
    <rect x="11.5" y="75.8" width="4.6" height="3.4" rx=".7" fill="#ffe48a" transform="rotate(6 13.8 77.5)"/>
    <rect x="17" y="76.5" width="4.6" height="3.4" rx=".7" fill="#ffe48a" transform="rotate(6 19.3 78.2)"/>
    <rect x="25.5" y="77.6" width="5" height="3.6" rx=".7" fill="#ffe48a" transform="rotate(6 28 79.4)"/>
    <rect x="31.5" y="78.4" width="5" height="3.6" rx=".7" fill="#ffe48a" transform="rotate(6 34 80.2)"/>
    <ellipse cx="14" cy="77" rx="1.3" ry=".9" fill="#fffdf0"/>
    <ellipse cx="28.5" cy="79" rx="1.3" ry=".9" fill="#fffdf0"/>
  </g>
  <!-- black grille + DMC badge -->
  <path d="M10.6 81.6 L38.6 85.6 L38.4 88 L10.9 84.2 Z" fill="#15171c"/>
  <rect x="22.5" y="83.4" width="4" height="1.8" rx=".4" fill="#aeb6c2" transform="rotate(8 24.5 84.3)"/>
  <!-- black front bumper with rub strip -->
  <path d="M10 88.5 L40 93 L40 97 L11.5 92.6 Q10.4 90.6 10 88.5 Z" fill="#1a1d23"/>
  <path d="M10.8 90.2 L39.4 94.6" stroke="#3c3947" stroke-width=".8" fill="none"/>
  <!-- amber corner indicators -->
  <rect x="8.9" y="78.2" width="2.6" height="1.6" rx=".5" fill="#ffb547"/>
  <rect x="36.2" y="81.9" width="2.8" height="1.7" rx=".5" fill="#ffb547"/>

  <!-- black rocker under the flank + tail edge -->
  <path d="M58.5 86.2 L87 82.6 A 8.8 8.8 0 0 0 88 85.4 L59.6 89 A 10.8 10.8 0 0 0 58.5 86.2 Z" fill="#1a1d23"/>
  <path d="M104 84.6 L113.6 83.5 L113.6 86.4 L105 87.4 A 8.8 8.8 0 0 0 104 84.6 Z" fill="#1a1d23"/>
  <path d="M112 79.7 L113.6 79.5 L113.6 86.4 L112 86.6 Z" fill="#1a1d23"/>
  <rect x="112.1" y="73.6" width="1.4" height="4.2" rx=".5" fill="#7c2730"/>

  <!-- wheels: near front biggest, rear smaller and farther -->
  <use href="#dl-wheel" transform="translate(48 90.5) scale(1.15)"/>
  <use href="#dl-wheel" transform="translate(95.5 83.6) scale(.93 .96)"/>
  <!-- arch shadows over the tyres -->
  <path d="M37.2 89.3 A 10.8 10.8 0 0 1 58.5 86.2 L56.4 86.5 A 8.8 8.8 0 0 0 39.3 89 Z" fill="#101218" opacity=".8"/>
  <path d="M87 82.6 A 8.8 8.8 0 0 1 104 84.6 L102 84.8 A 7 7 0 0 0 88.9 82.4 Z" fill="#101218" opacity=".8"/>
</svg>
