<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <clipPath id="calBody"><rect x="24" y="32" width="80" height="72" rx="12"/></clipPath>
  </defs>
  <g transform="rotate(-3 64 68)">
    <!-- Spiral binding posts -->
    <g stroke="#d4a52e" stroke-width="5" stroke-linecap="round">
      <line x1="44" y1="20" x2="44" y2="38"/>
      <line x1="84" y1="20" x2="84" y2="38"/>
    </g>

    <!-- Body (flat cel shading) -->
    <g clip-path="url(#calBody)">
      <rect x="24" y="32" width="80" height="72" fill="#332f34"/>
      <polygon points="24,72 104,62 104,104 24,104" fill="#1d1b20"/>
      <rect x="24" y="32" width="80" height="3.5" fill="#585360"/>
      <!-- Gold header band -->
      <rect x="24" y="32" width="80" height="20" fill="#d4a52e"/>
      <polygon points="24,32 104,32 104,52 24,48" fill="#e8bf52"/>
      <!-- "Today" cyan glass tile -->
      <rect x="38" y="62" width="28" height="26" fill="#5fd0e6"/>
      <polygon points="38,62 66,62 38,88" fill="#bff0fb" opacity=".7"/>
      <!-- Other day tiles -->
      <g fill="#585360">
        <rect x="74" y="62" width="18" height="11" rx="2"/>
        <rect x="74" y="78" width="18" height="10" rx="2"/>
      </g>
    </g>

    <!-- Outline frame -->
    <rect x="24" y="32" width="80" height="72" rx="12" fill="none" stroke="#16141a" stroke-width="3"/>
  </g>
</svg>
