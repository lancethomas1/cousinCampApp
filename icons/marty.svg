<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Marty skating across the screen — companion glyph to delorean.svg for
       the kudos fly-by. Side view facing right in a riding stance: knees
       bent, arms out for balance. Quilted orange puffer vest over a denim
       jacket, jeans, white sneakers, feathered 80s hair. -->
  <defs>
    <linearGradient id="mm-vest" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d94f15"/>
      <stop offset=".5" stop-color="#f06a24"/>
      <stop offset="1" stop-color="#ff9a4d"/>
    </linearGradient>
    <linearGradient id="mm-denim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8fb4e0"/>
      <stop offset="1" stop-color="#4f7cb6"/>
    </linearGradient>
    <linearGradient id="mm-jeans" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#46699c"/>
      <stop offset="1" stop-color="#6b8fc2"/>
    </linearGradient>
    <linearGradient id="mm-hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9a6a3a"/>
      <stop offset="1" stop-color="#5c3a1a"/>
    </linearGradient>
    <linearGradient id="mm-deck" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c1d22"/>
      <stop offset=".45" stop-color="#1c1d22"/>
      <stop offset=".5" stop-color="#c98d4e"/>
      <stop offset="1" stop-color="#8e5a26"/>
    </linearGradient>
    <radialGradient id="mm-wheel" cx="0.4" cy="0.38" r="0.7">
      <stop offset="0" stop-color="#fdf6e3"/>
      <stop offset=".7" stop-color="#efe2c2"/>
      <stop offset="1" stop-color="#bba672"/>
    </radialGradient>
    <radialGradient id="mm-skin" cx="0.6" cy="0.4" r="0.8">
      <stop offset="0" stop-color="#f8cfa4"/>
      <stop offset="1" stop-color="#e8ab74"/>
    </radialGradient>
    <filter id="mm-soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
  </defs>

  <!-- contact shadow -->
  <ellipse cx="66" cy="106" rx="40" ry="4.2" fill="#0c0818" opacity=".45" filter="url(#mm-soft)"/>

  <!-- speed lines streaking out behind the board -->
  <g stroke-linecap="round" fill="none">
    <path d="M8 56 H28" stroke="#a78bfa" stroke-width="2.2" opacity=".7"/>
    <path d="M13 70 H34" stroke="#a78bfa" stroke-width="2" opacity=".5"/>
    <path d="M6 84 H25" stroke="#7dd3fc" stroke-width="2" opacity=".55"/>
    <path d="M15 96 H36" stroke="#7dd3fc" stroke-width="1.8" opacity=".4"/>
  </g>

  <!-- ===== back arm (behind the torso), swung back for balance ===== -->
  <path d="M66 38.6
           Q58.5 39.4 54 43.4
           Q51 46 48.6 41.8
           Q47.2 39 49.8 38.6
           Q52.8 38 55.4 36.6
           Q60.5 34.4 66 36 Z" fill="#3f6aa3"/>
  <!-- denim cuff -->
  <path d="M51.4 37.9 L49.2 42.9 Q48 41.5 48.6 39.6 Q49 38.2 49.8 38.6 Z" fill="#33588c"/>
  <!-- back hand -->
  <path d="M49.6 38.2 Q47 38.6 45.6 37.4 Q44.6 36.5 45.3 35.5 Q44.8 34.2 46.2 33.9 Q48.2 33.5 49.5 34.7 Q50.8 36 50.4 37.6 Z" fill="#e8ab74"/>

  <!-- ===== legs in jeans, knees bent into the ride ===== -->
  <!-- back leg -->
  <path d="M56.5 59.5 L65.5 63
           Q60.5 69.5 58 75
           Q56 80.5 55.6 88.5
           L49.8 88.5
           Q50 79.5 52 73.5
           Q53.8 65.5 56.5 59.5 Z" fill="#3d5e92"/>
  <!-- front leg -->
  <path d="M61.5 60.5 L69.5 64.5
           Q75 69 77.6 74.5
           Q79.8 80 80 88.5
           L74.2 88.5
           Q74 81 72.2 76.5
           Q68.5 70 60 65.5 Z" fill="url(#mm-jeans)"/>
  <!-- knee + cuff creases -->
  <g stroke="#2e4a77" stroke-width=".7" opacity=".7" fill="none">
    <path d="M53 74 Q55.5 75.5 58 75"/>
    <path d="M50.5 86 L55.4 86"/>
    <path d="M72.8 74.5 Q75.2 75.8 77.6 74.5"/>
    <path d="M74.6 86 L79.6 86"/>
  </g>

  <!-- ===== skateboard ===== -->
  <!-- trucks -->
  <g fill="#9aa3ae">
    <path d="M48.4 94.4 L53.6 94.4 L52.4 98 Q51 99 49.6 98 Z"/>
    <path d="M79.4 94.4 L84.6 94.4 L83.4 98 Q82 99 80.6 98 Z"/>
  </g>
  <!-- deck: kicked tail behind, gentle nose ahead; grip tape on top edge -->
  <path d="M40 85.5
           Q44.5 91 50.5 91.9
           L83 91.9
           Q89.5 91.4 93.2 87.4
           L94.6 89
           Q90.5 93.8 83.4 94.4
           L50 94.4
           Q42.8 93.3 38.4 87
           Z" fill="url(#mm-deck)"/>
  <!-- wheels -->
  <circle cx="51" cy="100" r="4.3" fill="url(#mm-wheel)" stroke="#8d7e57" stroke-width=".6"/>
  <circle cx="82" cy="100" r="4.3" fill="url(#mm-wheel)" stroke="#8d7e57" stroke-width=".6"/>
  <circle cx="51" cy="100" r="1.5" fill="#857349"/>
  <circle cx="82" cy="100" r="1.5" fill="#857349"/>

  <!-- ===== sneakers planted on the deck ===== -->
  <g>
    <!-- back shoe -->
    <path d="M47.6 92 L47.6 89.4 Q47.6 87.4 50 87.2 L54.6 87 Q58 87.2 59.6 89.6 L60.4 92 Z" fill="#f4f7fa"/>
    <path d="M47.6 91 L60.1 91 L60.4 92 L47.6 92 Z" fill="#c9ced6"/>
    <path d="M49.4 89.8 Q52.6 90.6 55.4 89.2" stroke="#c2483d" stroke-width=".9" stroke-linecap="round" fill="none"/>
    <!-- front shoe -->
    <path d="M72 92 L72 89.4 Q72 87.4 74.4 87.2 L79 87 Q82.4 87.2 84 89.6 L84.8 92 Z" fill="#f4f7fa"/>
    <path d="M72 91 L84.5 91 L84.8 92 L72 92 Z" fill="#c9ced6"/>
    <path d="M73.8 89.8 Q77 90.6 79.8 89.2" stroke="#c2483d" stroke-width=".9" stroke-linecap="round" fill="none"/>
  </g>

  <!-- ===== denim jacket hem peeking below the vest ===== -->
  <path d="M56.5 58 L72 60 L71 64.5 Q63.5 65.5 56 62.5 Z" fill="url(#mm-denim)"/>

  <!-- ===== quilted puffer vest, leaning into the ride ===== -->
  <path d="M57.2 61
           Q55.8 54 58.4 47.5
           Q60.6 41.5 65.4 38.8
           L72.6 40.2
           Q74.8 46 74.4 52
           Q74 57.5 71.4 62
           Q64 63.8 57.2 61 Z" fill="url(#mm-vest)"/>
  <!-- quilt seams: horizontal puffer segments -->
  <g stroke="#b53f0e" stroke-width=".9" stroke-linecap="round" fill="none" opacity=".85">
    <path d="M56.6 56.5 Q65 59.5 73 56.8"/>
    <path d="M56.9 51 Q65.5 54 74.3 51.2"/>
    <path d="M58.2 45.6 Q66 48.4 74.4 46"/>
  </g>
  <!-- puffer highlights on each segment -->
  <g stroke="#ffb877" stroke-width="1.1" stroke-linecap="round" fill="none" opacity=".7">
    <path d="M58.5 54.2 Q65.5 56.8 72.5 54.6"/>
    <path d="M59.6 48.8 Q66.5 51.4 73.4 49"/>
    <path d="M61.5 43 Q67 45.4 73 43.6"/>
  </g>
  <!-- vest zipper line -->
  <path d="M70.8 40 Q73 46.5 72.6 52.5 Q72.3 57.5 70.4 61.6" stroke="#8c2f08" stroke-width=".7" fill="none" opacity=".8"/>
  <!-- vest collar -->
  <path d="M65.4 38.8 Q68.5 36.8 72 37.6 L73.4 40.4 Q69.5 41.6 66.6 40.6 Z" fill="#c2481a"/>

  <!-- ===== front arm reaching forward for balance ===== -->
  <path d="M68.5 41 Q77.5 41.5 82.5 45.5 Q85 43 87.5 41.5 Q81.5 35.5 71 37.5 Z" fill="url(#mm-denim)"/>
  <path d="M82.5 45.5 Q85.5 43 87.5 41.5 L90.6 39.6 Q92 38.7 92.8 40 Q93.6 41.4 92.3 42.3 L89 44.5 Q86.5 46.5 84.6 47.8 Z" fill="url(#mm-denim)"/>
  <!-- denim cuff -->
  <path d="M88.2 39.2 L90.8 43.2 L88.8 44.6 L86.2 40.6 Z" fill="#3a6097"/>
  <!-- front hand -->
  <path d="M90.8 39.2 Q93.4 37.6 95.2 38.6 Q96.6 39.4 96 40.8 Q97 42 95.8 43 Q94 44.6 91.8 43.8 Q90.2 43.2 90 41.4 Z" fill="url(#mm-skin)"/>

  <!-- ===== neck and head: 3/4 view turned a touch toward the viewer, so
       the famous face reads — big feathered hair, strong brows, boyish
       grin ===== -->
  <path d="M70.5 34.2 L75.8 33.8 L76.2 39 Q72.6 40.2 69.8 38.7 Z" fill="#e8ab74"/>
  <!-- face -->
  <path d="M68.6 26.5
           Q68.2 20.6 72.2 18.8
           Q76.8 17.2 80 20.2
           Q82 22.2 82 25.5
           Q82 29 81 31.2
           Q79.8 33.8 77 35
           Q74.2 36 72 34.8
           Q69.6 33.4 69 30.4
           Q68.7 28.4 68.6 26.5 Z" fill="url(#mm-skin)"/>
  <!-- brows: straight-ish and strong -->
  <g stroke="#6b4423" stroke-width="1.1" stroke-linecap="round" fill="none">
    <path d="M71.3 24.9 Q72.7 24.2 74.1 24.7"/>
    <path d="M76.7 24.6 Q78.2 23.9 79.7 24.6"/>
  </g>
  <!-- eyes -->
  <g>
    <ellipse cx="72.8" cy="26.7" rx="1.3" ry=".95" fill="#fdf8f2"/>
    <ellipse cx="78.2" cy="26.5" rx="1.4" ry="1" fill="#fdf8f2"/>
    <circle cx="73.1" cy="26.8" r=".62" fill="#3a2614"/>
    <circle cx="78.5" cy="26.6" r=".66" fill="#3a2614"/>
  </g>
  <!-- nose: straight with a slight upturn, turned with the head -->
  <path d="M76.3 26.6 Q77.2 28.2 77.1 29.4 Q77 30 76.2 29.9"
        stroke="#cf8f5c" stroke-width=".9" stroke-linecap="round" fill="none"/>
  <path d="M75.5 29.8 Q75.9 30.2 76.4 30" stroke="#c2814e" stroke-width=".6" stroke-linecap="round" fill="none" opacity=".8"/>
  <!-- the grin: wide open smile with a flash of teeth -->
  <path d="M73.2 31.3 Q75.9 34.1 78.7 31.1 Q76 32 73.2 31.3 Z" fill="#8c4a32"/>
  <path d="M73.8 31.4 Q76 32.5 78.1 31.3 Q76 31.9 73.8 31.4 Z" fill="#fffdf6"/>
  <!-- cheek shadow giving the jaw some shape -->
  <path d="M71.2 30.2 Q71.8 32.6 73.5 33.8" stroke="#d99c66" stroke-width=".8" stroke-linecap="round" fill="none" opacity=".7"/>
  <!-- chin crease under the grin -->
  <path d="M75.2 33.6 Q76 34.1 76.9 33.6" stroke="#d99c66" stroke-width=".7" stroke-linecap="round" fill="none" opacity=".8"/>
  <!-- ear, exposed below the hairline (spans eye-to-nose height) -->
  <path d="M68.4 28.6 Q67.6 27 68.6 26.1 Q69.7 25.4 70.4 26.6 Q71 27.8 70.3 29.3 Q69.2 30.3 68.4 28.6 Z" fill="#e8ab74"/>
  <path d="M68.9 26.9 Q69.6 26.9 69.8 27.7" stroke="#c2814e" stroke-width=".5" stroke-linecap="round" fill="none"/>
  <!-- the hair: feathered 80s cut — volume swept up off the forehead and
       back at the crown, short over the ears -->
  <path d="M68.6 26
           Q67.6 19.6 70.6 17.2
           Q73.6 15.2 77.4 15.9
           Q81.4 16.7 82.9 20
           Q84.1 22.8 83.5 26
           Q83.2 27.5 82.3 26.3
           Q81.7 25.2 80.7 24.7
           Q81.4 22 79.4 20.8
           Q77.6 22.5 74.8 22
           Q71.8 21.5 70.4 23.4
           Q69.7 24.5 69.6 26.2
           Q69.1 27.2 68.6 26 Z" fill="url(#mm-hair)"/>
  <!-- feathering strands -->
  <g stroke="#54341a" stroke-width=".6" stroke-linecap="round" fill="none" opacity=".75">
    <path d="M72 17.2 Q70.6 19 70 21.6"/>
    <path d="M76 15.9 Q75 17.9 74.8 20.2"/>
    <path d="M80 17.3 Q80.8 19.2 81 21.6"/>
    <path d="M82.7 21.4 Q83.2 23.4 83 25.2"/>
  </g>
  <!-- short sideburn in front of the ear -->
  <path d="M70.3 25.8 L71.2 25.8 L71 28.2 L70.4 27.4 Z" fill="#5c3a1a"/>
</svg>
