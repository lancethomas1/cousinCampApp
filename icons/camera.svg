<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <clipPath id="camBody"><rect x="14" y="44" width="100" height="60" rx="13"/></clipPath>
  </defs>

  <!-- Flash spark (angular cel star) -->
  <polygon fill="#fff6d8" opacity=".9"
    points="104,18 108,30 120,32 109,38 112,50 104,42 96,50 99,38 88,32 100,30"/>

  <g transform="rotate(-3 64 74)">
    <!-- Viewfinder hump -->
    <polygon points="44,44 52,31 80,31 88,44" fill="#2a262d"/>
    <rect x="50" y="29" width="30" height="9" rx="3.5" fill="#16141a"/>

    <!-- Body (flat cel shading) -->
    <g clip-path="url(#camBody)">
      <rect x="14" y="44" width="100" height="60" fill="#332f34"/>
      <polygon points="14,78 114,68 114,104 14,104" fill="#1d1b20"/>
      <rect x="14" y="44" width="100" height="4" fill="#585360"/>
    </g>
    <rect x="14" y="44" width="100" height="60" rx="13" fill="none" stroke="#16141a" stroke-width="3"/>

    <!-- Lens (cyan glass like the cab window) -->
    <circle cx="62" cy="75" r="22" fill="#16141a"/>
    <circle cx="62" cy="75" r="17" fill="#5fd0e6" stroke="#d4a52e" stroke-width="3"/>
    <path d="M62 58a17 17 0 0 0 -17 17z" fill="#bff0fb" opacity=".75"/>
    <circle cx="62" cy="75" r="6.5" fill="#16141a"/>
    <circle cx="56" cy="69" r="3" fill="#fff" opacity=".85"/>

    <!-- Flash lamp -->
    <rect x="92" y="53" width="13" height="9" rx="2.5" fill="#ffce4d" stroke="#d4a52e" stroke-width="1.5"/>
  </g>
</svg>
