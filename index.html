<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1e1a2e" />
  <title>Cousin Camp · Time Machine Travelers 🚗</title>
  <meta name="description" content="Mimi's Cousin Camp 2026 — Time Machine Travelers. Travel through time with daily activities and camp awards." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=20260613b" />
  <!-- App icons (favicon, iOS home screen, PWA manifest) -->
  <link rel="icon" type="image/svg+xml" href="icons/camp.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/camp-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/camp-180.png" />
  <link rel="manifest" href="site.webmanifest" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Cousin Camp" />
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-mark"><img src="icons/delorean.svg?v=20260612" alt="" width="42" height="42" /></span>
        <div class="brand-text">
          <h1>Cousin Camp</h1>
          <p>Time Machine Travelers</p>
        </div>
      </div>
      <button id="whoami" class="whoami" type="button" aria-label="Choose your traveler">
        <span class="whoami-emoji">👋</span>
        <span class="whoami-name">Pick traveler</span>
      </button>
    </div>
  </header>

  <!-- Main view container -->
  <main id="view" class="view" tabindex="-1"></main>

  <!-- Bottom navigation -->
  <nav class="tabbar" role="tablist" aria-label="Main navigation">
    <button class="tab" data-route="today"    role="tab"><img class="tab-icon" src="icons/calendar.svg" alt=""><span>Today</span></button>
    <button class="tab" data-route="schedule" role="tab"><img class="tab-icon" src="icons/schedule.svg" alt=""><span>Schedule</span></button>
    <button class="tab" data-route="cheers"   role="tab"><img class="tab-icon" src="icons/cheers.svg" alt=""><span>Cheers</span></button>
    <button class="tab" data-route="awards"   role="tab"><img class="tab-icon" src="icons/trophy.svg" alt=""><span>Awards</span></button>
  </nav>

  <!-- Camper picker modal -->
  <div id="camper-modal" class="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="camper-modal-title">
      <h2 id="camper-modal-title">Who's time traveling?</h2>
      <p class="modal-sub">Pick your traveler to track your points and prizes.</p>
      <div id="camper-grid" class="camper-grid"></div>
      <button class="btn-ghost" data-close type="button">Close</button>
    </div>
  </div>

  <!-- Firebase (compat) — powers the shared camp. Falls back to local mode
       if these fail to load or aren't configured. -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="data.js?v=20260608"></script>
  <script src="firebase-config.js?v=20260608"></script>
  <script src="core.js?v=20260613b"></script>
  <script src="app.js?v=20260612c"></script>
</body>
</html>
